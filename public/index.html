<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cüzdanım - Gelir & Gider Takibi</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-2 md:p-4 font-sans text-sm">

    <div class="w-full bg-white rounded shadow-md overflow-hidden">
        
        <div class="bg-indigo-600 p-3 text-white flex justify-between items-center">
            <h1 class="text-base font-bold">💰 Cüzdanım</h1>
            <button id="open-report-btn" class="bg-indigo-500 hover:bg-indigo-400 text-white text-xs font-bold py-1.5 px-3 rounded transition-colors flex items-center gap-1 shadow-sm">
                📊 Raporları Gör
            </button>
        </div>

        <div class="p-2 md:p-4">
            <div id="warning-message" class="hidden mb-3 py-1.5 px-3 rounded text-xs font-bold text-center"></div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
                <div class="p-2 rounded bg-blue-50 border border-blue-200">
                    <h2 class="text-gray-600 text-[10px] font-bold uppercase">Toplam Birikim</h2>
                    <p id="total-savings" class="text-base font-bold text-blue-600">₺ 0,00</p>
                </div>
                <div class="p-2 rounded bg-green-50 border border-green-200">
                    <h2 class="text-gray-600 text-[10px] font-bold uppercase">Aylık Gelir</h2>
                    <p id="total-income" class="text-base font-bold text-green-600">₺ 0,00</p>
                </div>
                <div class="p-2 rounded bg-red-50 border border-red-200">
                    <h2 class="text-gray-600 text-[10px] font-bold uppercase">Toplam Gider</h2>
                    <p id="total-expense" class="text-base font-bold text-red-600">₺ 0,00</p>
                </div>
                <div id="balance-card" class="p-2 rounded border transition-colors duration-300">
                    <h2 class="text-gray-600 text-[10px] font-bold uppercase">Aylık Kalan Bakiye</h2>
                    <p id="total-balance" class="text-base font-bold">₺ 0,00</p>
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded border mb-4">
                <form id="transaction-form" class="grid grid-cols-2 md:flex md:flex-wrap items-center gap-2">
                    <select id="type" class="p-2 md:p-1.5 text-xs border rounded bg-white w-full md:w-auto" required>
                        <option value="gelir">Gelir</option>
                        <option value="gider">Gider</option>
                    </select>
                    
                    <select id="income-type" class="p-2 md:p-1.5 text-xs border rounded bg-white w-full md:w-auto">
                        <option value="aylik">Aylık/Düzenli</option>
                        <option value="birikim">Birikim</option>
                    </select>

                    <input type="text" id="amount" inputmode="decimal" placeholder="Tutar (Örn: 1500)" class="p-2 md:p-1.5 text-xs border rounded bg-white w-full md:w-24" required>
                    <input type="text" id="category" placeholder="Kategori" class="p-2 md:p-1.5 text-xs border rounded bg-white w-full md:w-24" required>
                    
                    <select id="fix-var-type" class="p-2 md:p-1.5 text-xs border rounded bg-white w-full md:w-auto" required>
                        <option value="sabit">Sabit</option>
                        <option value="degisken">Değişken</option>
                    </select>

                    <select id="recurring" class="p-2 md:p-1.5 text-xs border rounded bg-white w-full md:w-auto" required>
                        <option value="tek">Tek Seferlik</option>
                        <option value="duzenli">Her Ay</option>
                    </select>

                    <div id="recurring-day-container" class="hidden items-center gap-1 col-span-2 md:col-span-1 bg-white md:bg-transparent p-1 md:p-0 border md:border-none rounded">
                        <span class="text-[10px] text-gray-500 pl-1">Ayın kaçı:</span>
                        <input type="text" id="recurring-day" placeholder="Gün" class="p-1 md:p-1.5 text-xs border rounded w-12 bg-white">
                    </div>

                    <input type="text" id="description" placeholder="Açıklama (İsteğe bağlı)" class="p-2 md:p-1.5 text-xs border rounded bg-white col-span-2 md:flex-1 md:min-w-[120px]">
                    
                    <div class="flex gap-1 col-span-2 md:col-span-1 justify-end w-full md:w-auto mt-1 md:mt-0">
                        <button type="submit" id="submit-btn" class="bg-indigo-600 text-white text-xs font-bold py-2 md:py-1.5 px-4 md:px-3 rounded hover:bg-indigo-700 w-full md:w-auto text-center">EKLE</button>
                        <button type="button" id="cancel-btn" class="hidden bg-gray-400 text-white text-xs font-bold py-2 md:py-1.5 px-4 md:px-3 rounded hover:bg-gray-500 w-full md:w-auto text-center">İPTAL</button>
                    </div>
                </form>
            </div>

            <div class="hidden md:grid grid-cols-12 gap-4 bg-gray-100 p-2.5 px-4 text-xs font-semibold text-gray-600 border-b rounded-t-lg items-center">
                <div class="col-span-2">Zamanlama</div>
                <div class="col-span-1">Tür</div>
                <div class="col-span-2">Kategori</div>
                <div class="col-span-4">Açıklama</div>
                <div class="col-span-2 text-right">Tutar</div>
                <div class="col-span-1 text-center">İşlem</div>
            </div>

            <div id="transaction-list" class="space-y-3 md:space-y-0 text-xs"></div>

        </div>
    </div>

    <div id="report-modal" class="fixed inset-0 bg-gray-950/60 z-50 hidden items-center justify-center p-4 backdrop-blur-sm transition-all duration-300">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-5 relative border border-gray-100 transform scale-95 transition-transform">
            
            <button id="close-report-btn" class="absolute top-3 right-4 text-gray-400 hover:text-gray-600 text-2xl font-bold transition-colors">&times;</button>
            
            <h3 class="text-sm font-bold text-gray-800 mb-4 flex items-center gap-1.5 uppercase tracking-wide">
                📊 Gelişmiş Finans Raporları
            </h3>
            
            <div class="flex border-b border-gray-200 mb-3 text-xs font-bold select-none">
                <button id="report-tab-gider" class="flex-1 py-2 text-center border-b-2 border-indigo-600 text-indigo-600 transition-all">GİDERLER</button>
                <button id="report-tab-gelir" class="flex-1 py-2 text-center text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-all">GELİRLER</button>
            </div>

            <div class="flex gap-1 mb-4 bg-gray-100 p-1 rounded-lg text-[11px] font-bold text-gray-500 select-none">
                <button id="sub-tab-kategori" class="flex-1 py-1 rounded bg-white text-gray-800 shadow-sm transition-all">Kategori</button>
                <button id="sub-tab-nitelik" class="flex-1 py-1 rounded hover:bg-white/50 hover:text-gray-700 transition-all">Sabit/Değişken</button>
                <button id="sub-tab-zamanlama" class="flex-1 py-1 rounded hover:bg-white/50 hover:text-gray-700 transition-all">Zamanlama</button>
            </div>
            
            <div class="w-full min-h-[260px] flex items-center justify-center relative">
                <div id="chart-empty-message" class="hidden text-center text-gray-400 font-medium text-xs p-8">
                    Seçilen kriterlere uygun herhangi bir kayıt bulunamadı.
                </div>
                <canvas id="expensePieChart" class="w-full max-h-[280px]"></canvas>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-3 overflow-hidden pointer-events-none"></div>

    <script src="app.js?v=6"></script>
</body>
</html>
