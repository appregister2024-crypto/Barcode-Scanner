<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>BarkodScan — Evrensel Okuyucu</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#080808;--surface:#111;--surface2:#1a1a1a;--border:#2a2a2a;
      --accent:#00ff87;--accent2:#00d4ff;--danger:#ff3d5a;
      --text:#f0f0f0;--muted:#666;
      --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;overscroll-behavior:none}

    header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(8,8,8,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .logo{font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px}
    .logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

    main{padding-top:64px;min-height:100vh;display:flex;flex-direction:column}

    /* ── VIDEO WRAP ── */
    .scanner-wrap{position:relative;width:100%;background:#000}
    #video-container{position:relative;width:100%;aspect-ratio:3/4;max-height:72vh;overflow:hidden;background:#000}

    /* Video tam görünür */
    #video{
      position:absolute;top:0;left:0;
      width:100%;height:100%;
      object-fit:cover;
      display:block;
      z-index:1;
    }

    /* Overlay her zaman üstte */
    .scan-overlay{position:absolute;inset:0;pointer-events:none;z-index:2}

    /* Mode tabs */
    .mode-tabs{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:5}
    .mode-tab{font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:5px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
    .mode-tab.active{background:var(--accent);color:#000;font-weight:700}

    /* Çerçeve — linear barkod (yatay dikdörtgen) */
    .scan-frame{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);width:85%;height:22%;border:none}
    .scan-frame::before,.scan-frame::after,.c-br,.c-bl{content:'';position:absolute;width:28px;height:28px;border-color:var(--accent);border-style:solid;border-radius:2px}
    .scan-frame::before{top:0;left:0;border-width:3px 0 0 3px}
    .scan-frame::after{top:0;right:0;border-width:3px 3px 0 0}
    .c-br{bottom:0;right:0;border-width:0 3px 3px 0}
    .c-bl{bottom:0;left:0;border-width:0 0 3px 3px}

    /* Çerçeve — QR (kare) */
    .qr-frame{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);width:58%;aspect-ratio:1;border:none;display:none}
    .qr-frame::before,.qr-frame::after,.q-br,.q-bl{content:'';position:absolute;width:24px;height:24px;border-color:var(--accent2);border-style:solid;border-radius:2px}
    .qr-frame::before{top:0;left:0;border-width:3px 0 0 3px}
    .qr-frame::after{top:0;right:0;border-width:3px 3px 0 0}
    .q-br{bottom:0;right:0;border-width:0 3px 3px 0}
    .q-bl{bottom:0;left:0;border-width:0 0 3px 3px}

    .laser{position:absolute;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);box-shadow:0 0 12px var(--accent),0 0 24px rgba(0,255,135,.4);animation:scanline 1.8s ease-in-out infinite;top:50%}
    @keyframes scanline{0%{top:35%}50%{top:75%}100%{top:35%}}

    /* Koyu kenar */
    .scan-overlay::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 65% 65% at 50% 50%,transparent 50%,rgba(0,0,0,.6) 100%)}

    .flash{position:absolute;inset:0;background:rgba(0,255,135,.22);opacity:0;pointer-events:none;transition:opacity .1s;z-index:3}
    .flash.active{opacity:1}

    /* Hint metni */
    .scan-hint{position:absolute;bottom:14%;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;z-index:4;text-align:center}

    .cam-controls{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:10px;z-index:5}
    .cam-btn{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.65);backdrop-filter:blur(8px);color:#fff;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .cam-btn:active{transform:scale(.9);background:rgba(0,255,135,.3)}
    .cam-btn.torch-on{background:rgba(255,220,0,.35);border-color:rgba(255,220,0,.7)}

    /* START SCREEN */
    .start-screen{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10}
    .start-icon{font-size:56px}
    .start-title{font-weight:800;font-size:22px;text-align:center}
    .start-sub{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;line-height:1.8;max-width:250px}
    .btn-start{padding:14px 38px;background:var(--accent);color:#000;font-family:var(--sans);font-weight:700;font-size:15px;border:none;border-radius:8px;cursor:pointer;box-shadow:0 0 28px rgba(0,255,135,.4)}
    .btn-start:active{transform:scale(.96)}
    .btn-upload{padding:10px 28px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:12px;border:1px solid var(--border);border-radius:8px;cursor:pointer}

    /* STATUS */
    .status-bar{padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .status-dot.scanning{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 1s infinite}
    .status-dot.found{background:var(--accent)}
    .status-dot.error{background:var(--danger)}
    .status-text{color:var(--muted);flex:1}

    /* RESULTS */
    .result-section{padding:16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(16px,env(safe-area-inset-bottom))}
    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;animation:slideUp .3s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .result-card.new-entry{border-color:var(--accent);box-shadow:0 0 20px rgba(0,255,135,.15)}
    .card-header{padding:12px 16px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .card-format{font-family:var(--mono);font-size:10px;color:var(--accent2);background:rgba(0,212,255,.1);padding:3px 8px;border-radius:4px;border:1px solid rgba(0,212,255,.25)}
    .card-time{font-family:var(--mono);font-size:10px;color:var(--muted)}
    .card-body{padding:14px 16px}
    .card-value{font-family:var(--mono);font-size:16px;font-weight:700;word-break:break-all;line-height:1.4;margin-bottom:10px}
    .card-actions{display:flex;gap:8px;flex-wrap:wrap}
    .card-action-btn{font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
    .card-action-btn:active{background:var(--surface2);color:var(--text);border-color:var(--accent)}
    .card-action-btn.primary{border-color:var(--accent);color:var(--accent)}
    .card-link{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:6px;text-decoration:none;color:var(--accent2);font-family:var(--mono);font-size:12px;margin-bottom:10px;word-break:break-all}

    .empty-state{padding:40px 20px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;line-height:2}
    .empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
    .history-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
    .history-title{font-family:var(--sans);font-weight:600;font-size:13px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
    .btn-clear{font-family:var(--mono);font-size:11px;color:var(--danger);background:none;border:none;cursor:pointer;padding:4px 8px;opacity:.6}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);padding:12px 20px;border-radius:8px;font-family:var(--mono);font-size:12px;color:var(--text);z-index:999;transition:transform .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    .toast.show{transform:translateX(-50%) translateY(0)}
    #file-input{display:none}

    @media(min-width:600px){#video-container{max-height:60vh}}
  </style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>BarkodScan</div>
  <div style="font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:20px;color:var(--muted)">15+ format</div>
</header>

<main>
  <div class="scanner-wrap">
    <div id="video-container">
      <!-- Video: z-index:1, her zaman görünür -->
      <video id="video" playsinline muted autoplay></video>

      <!-- START SCREEN -->
      <div class="start-screen" id="start-screen">
        <div class="start-icon">📷</div>
        <div class="start-title">Barkod Okuyucu</div>
        <div class="start-sub">QR · EAN-8 · EAN-13 · UPC-A<br/>Code 128 · Code 39 · ITF<br/>Data Matrix · Aztec · PDF-417</div>
        <button class="btn-start" id="btn-start">Kamerayı Başlat</button>
        <button class="btn-upload" id="btn-upload-start">📁 Galeriden Seç</button>
      </div>

      <!-- MODE TABS -->
      <div class="mode-tabs" id="mode-tabs" style="display:none">
        <button class="mode-tab active" id="tab-barcode" onclick="setMode('barcode')">Barkod</button>
        <button class="mode-tab" id="tab-qr" onclick="setMode('qr')">QR / 2D</button>
        <button class="mode-tab" id="tab-both" onclick="setMode('both')">Tümü</button>
      </div>

      <!-- SCAN OVERLAY -->
      <div class="scan-overlay" id="scan-overlay" style="display:none">
        <div class="scan-frame" id="barcode-frame">
          <div class="c-br"></div><div class="c-bl"></div>
        </div>
        <div class="qr-frame" id="qr-frame">
          <div class="q-br"></div><div class="q-bl"></div>
        </div>
        <div class="laser" id="laser"></div>
        <div class="scan-hint" id="scan-hint">Barkodu çerçeve içine hizalayın</div>
      </div>

      <div class="flash" id="flash"></div>

      <!-- CAM CONTROLS -->
      <div class="cam-controls" id="cam-controls" style="display:none">
        <button class="cam-btn" id="btn-torch">💡</button>
        <button class="cam-btn" id="btn-flip">🔄</button>
        <button class="cam-btn" id="btn-upload-cam">📁</button>
      </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar" id="status-bar" style="display:none">
      <div class="status-dot scanning" id="status-dot"></div>
      <div class="status-text" id="status-text">Taranıyor...</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted)" id="scan-count">0 tarama</div>
    </div>
  </div>

  <div class="history-header" id="history-header" style="display:none">
    <div class="history-title">Sonuçlar</div>
    <button class="btn-clear" id="btn-clear">Temizle</button>
  </div>

  <div class="result-section" id="result-section">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">◎</div>
      Henüz sonuç yok.<br/>Kamerayı başlatın ve bir barkod okutun.
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*" />

<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>

<script>
// ── STATE ──
let mode = 'barcode';
let facingMode = 'environment';
let torchOn = false;
let scanCount = 0;
let results = [];
let scanning = false;
let lastCode = '';
let lastCodeTime = 0;
const DEBOUNCE = 2200;

let currentStream = null;
let zxingReader = null;
let zxingInterval = null;
let quaggaActive = false;

// ── ELEMENTS ──
const video         = document.getElementById('video');
const startScreen   = document.getElementById('start-screen');
const scanOverlay   = document.getElementById('scan-overlay');
const camControls   = document.getElementById('cam-controls');
const modeTabs      = document.getElementById('mode-tabs');
const statusBar     = document.getElementById('status-bar');
const statusDot     = document.getElementById('status-dot');
const statusText    = document.getElementById('status-text');
const scanCountEl   = document.getElementById('scan-count');
const resultSection = document.getElementById('result-section');
const emptyState    = document.getElementById('empty-state');
const historyHeader = document.getElementById('history-header');
const flash         = document.getElementById('flash');
const toast         = document.getElementById('toast');
const fileInput     = document.getElementById('file-input');
const btnTorch      = document.getElementById('btn-torch');
const barcodeFrame  = document.getElementById('barcode-frame');
const qrFrame       = document.getElementById('qr-frame');
const laser         = document.getElementById('laser');
const scanHint      = document.getElementById('scan-hint');

// ── UTILS ──
function showToast(msg, dur=2200) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), dur);
}
function formatTime(d) {
  return d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function isURL(s) {
  try { const u=new URL(s); return u.protocol==='http:'||u.protocol==='https:'; } catch{return false;}
}
const FMT = {
  QR_CODE:'QR Code',EAN_13:'EAN-13',EAN_8:'EAN-8',UPC_A:'UPC-A',UPC_E:'UPC-E',
  CODE_128:'Code 128',CODE_39:'Code 39',CODE_93:'Code 93',ITF:'ITF',
  CODABAR:'Codabar',DATA_MATRIX:'Data Matrix',AZTEC:'Aztec',PDF_417:'PDF-417',
  ean_reader:'EAN-13',ean_8_reader:'EAN-8',upc_reader:'UPC-A',upc_e_reader:'UPC-E',
  code_128_reader:'Code 128',code_39_reader:'Code 39',code_93_reader:'Code 93',
  i2of5_reader:'ITF',codabar_reader:'Codabar',
};
function prettyFmt(f) { return FMT[f] || f; }

// ── MODE ──
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+m).classList.add('active');
  if (m==='qr') {
    barcodeFrame.style.display='none'; qrFrame.style.display=''; laser.style.display='none';
    scanHint.textContent='QR kodu çerçeve içine hizalayın';
  } else if (m==='barcode') {
    barcodeFrame.style.display=''; qrFrame.style.display='none'; laser.style.display='';
    scanHint.textContent='Barkodu çerçeve içine hizalayın';
  } else {
    barcodeFrame.style.display=''; qrFrame.style.display=''; laser.style.display='';
    scanHint.textContent='Barkodu veya QR kodu çerçeveye getirin';
  }
  if (scanning) { stopEngines(); setTimeout(startEngines, 200); }
}
window.setMode = setMode;

// ── ON RESULT ──
function onResult(value, format) {
  const now = Date.now();
  if (value===lastCode && (now-lastCodeTime)<DEBOUNCE) return;
  lastCode=value; lastCodeTime=now;

  scanCount++;
  scanCountEl.textContent = scanCount+' tarama';
  flash.classList.add('active');
  setTimeout(()=>flash.classList.remove('active'), 200);
  if (navigator.vibrate) navigator.vibrate([80]);

  statusDot.className='status-dot found';
  statusText.textContent='✓ Okundu: '+prettyFmt(format);
  setTimeout(()=>{
    if(scanning){statusDot.className='status-dot scanning';statusText.textContent='Taranıyor...';}
  }, 2000);

  const entry={id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2),value,format,time:formatTime(new Date())};
  results.unshift(entry);
  emptyState.style.display='none'; historyHeader.style.display='';
  const card=renderCard(entry,true);
  const first=resultSection.querySelector('.result-card');
  if(first) resultSection.insertBefore(card,first);
  else resultSection.appendChild(card);
  setTimeout(()=>card.classList.remove('new-entry'),2500);
  setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

// ── STREAM ──
async function getStream() {
  const constraints = {
    video: {
      facingMode,
      width: { ideal: 1280 },
      height: { ideal: 720 },
    }
  };
  currentStream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = currentStream;
  video.setAttribute('playsinline', true);
  await video.play();
}

// ── QUAGGA on canvas (kamera görüntüsü video'da, Quagga canvas'ta okur) ──
function startQuagga() {
  if (quaggaActive) return;

  // Quagga'yı video elementi üzerinden değil, canvas üzerinden çalıştır
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  function processFrame() {
    if (!quaggaActive || !scanning) return;
    if (video.readyState < 2 || video.videoWidth === 0) {
      requestAnimationFrame(processFrame);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    Quagga.decodeSingle({
      decoder: {
        readers: [
          'ean_reader','ean_8_reader',
          'upc_reader','upc_e_reader',
          'code_128_reader','code_39_reader',
          'code_93_reader','i2of5_reader',
          'codabar_reader',
        ]
      },
      locate: true,
      src: canvas.toDataURL('image/png'),
    }, function(result) {
      if (result && result.codeResult && result.codeResult.code) {
        onResult(result.codeResult.code, result.codeResult.format);
      }
    });

    setTimeout(() => { if (quaggaActive && scanning) requestAnimationFrame(processFrame); }, 400);
  }

  quaggaActive = true;
  requestAnimationFrame(processFrame);
}

function stopQuagga() {
  quaggaActive = false;
}

// ── ZXING (QR, Data Matrix, Aztec, PDF-417) ──
function startZXing() {
  if (zxingInterval) return;
  if (!zxingReader) {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.DATA_MATRIX,
      ZXing.BarcodeFormat.AZTEC,
      ZXing.BarcodeFormat.PDF_417,
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    zxingReader = new ZXing.BrowserMultiFormatReader(hints, 400);
  }

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  zxingInterval = setInterval(() => {
    if (video.readyState < 2 || video.videoWidth === 0) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    try {
      const result = zxingReader.decodeFromCanvas(canvas);
      if (result) onResult(result.getText(), result.getBarcodeFormat().toString());
    } catch(e) {}
  }, 350);
}

function stopZXing() {
  if (zxingInterval) { clearInterval(zxingInterval); zxingInterval=null; }
  if (zxingReader) { try { zxingReader.reset(); } catch(e){} zxingReader=null; }
}

// ── START / STOP ENGINES ──
function startEngines() {
  if (mode==='barcode' || mode==='both') startQuagga();
  if (mode==='qr'      || mode==='both') startZXing();
}

function stopEngines() {
  stopQuagga();
  stopZXing();
}

// ── MAIN START ──
async function startCamera() {
  startScreen.style.display='none';

  try {
    await getStream();
  } catch(e) {
    showToast('⚠ Kamera izni gerekli', 3000);
    startScreen.style.display='';
    return;
  }

  scanOverlay.style.display='';
  camControls.style.display='';
  modeTabs.style.display='';
  statusBar.style.display='';
  statusDot.className='status-dot scanning';
  statusText.textContent='Taranıyor...';
  scanning=true;
  setMode(mode); // frame visibility
  startEngines();
}

async function restartCamera() {
  stopEngines();
  if (currentStream) { currentStream.getTracks().forEach(t=>t.stop()); currentStream=null; }
  video.srcObject=null;
  torchOn=false; btnTorch.classList.remove('torch-on');
  await new Promise(r=>setTimeout(r,300));
  try {
    await getStream();
    startEngines();
  } catch(e) { showToast('⚠ Kamera başlatılamadı'); }
}

function stopAll() {
  scanning=false;
  stopEngines();
  if (currentStream) { currentStream.getTracks().forEach(t=>t.stop()); currentStream=null; }
  video.srcObject=null;
}

// ── TORCH ──
btnTorch.addEventListener('click', async () => {
  if (!currentStream) { showToast('Önce kamerayı başlatın'); return; }
  const track = currentStream.getVideoTracks()[0];
  if (!track) return;
  const caps = track.getCapabilities ? track.getCapabilities() : {};
  if (!caps.torch) { showToast('Bu cihazda flaş desteklenmiyor'); return; }
  torchOn = !torchOn;
  try {
    await track.applyConstraints({ advanced:[{torch:torchOn}] });
    btnTorch.classList.toggle('torch-on', torchOn);
    showToast(torchOn ? '💡 Flaş açık' : '💡 Flaş kapalı');
  } catch(e) { showToast('Flaş kullanılamıyor'); }
});

// ── FLIP ──
document.getElementById('btn-flip').addEventListener('click', async () => {
  facingMode = facingMode==='environment' ? 'user' : 'environment';
  await restartCamera();
  showToast(facingMode==='environment' ? '📷 Arka kamera' : '🤳 Ön kamera');
});

// ── FILE SCAN ──
function scanFile(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = async () => {
    let found = false;

    // ZXing ile dene
    if (!zxingReader) {
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.QR_CODE,ZXing.BarcodeFormat.DATA_MATRIX,
        ZXing.BarcodeFormat.AZTEC,ZXing.BarcodeFormat.PDF_417,
        ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.UPC_A,
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      zxingReader = new ZXing.BrowserMultiFormatReader(hints);
    }
    try {
      const canvas = document.createElement('canvas');
      canvas.width=img.naturalWidth; canvas.height=img.naturalHeight;
      canvas.getContext('2d').drawImage(img,0,0);
      const res = zxingReader.decodeFromCanvas(canvas);
      if (res) { onResult(res.getText(), res.getBarcodeFormat().toString()); found=true; }
    } catch(e) {}

    // Quagga ile dene
    if (!found) {
      Quagga.decodeSingle({
        decoder:{readers:['ean_reader','ean_8_reader','upc_reader','code_128_reader','code_39_reader','i2of5_reader']},
        locate:true, src:url,
      }, function(result) {
        if (result && result.codeResult && result.codeResult.code) {
          onResult(result.codeResult.code, result.codeResult.format);
          showToast('✓ Barkod okundu');
        } else if (!found) {
          showToast('⚠ Barkod bulunamadı');
        }
        URL.revokeObjectURL(url);
      });
    } else {
      URL.revokeObjectURL(url);
      showToast('✓ Barkod okundu');
      statusBar.style.display='';
      historyHeader.style.display='';
    }
  };
  img.src = url;
}

fileInput.addEventListener('change', e => { if(e.target.files[0]) scanFile(e.target.files[0]); e.target.value=''; });
document.getElementById('btn-upload-start').addEventListener('click', ()=>fileInput.click());
document.getElementById('btn-upload-cam').addEventListener('click', ()=>fileInput.click());
document.getElementById('btn-start').addEventListener('click', startCamera);

// ── CLEAR ──
document.getElementById('btn-clear').addEventListener('click', () => {
  results=[]; lastCode='';
  resultSection.querySelectorAll('.result-card').forEach(c=>c.remove());
  emptyState.style.display=''; historyHeader.style.display='none';
  showToast('Temizlendi');
});

// ── RENDER CARD ──
function renderCard(entry, isNew=false) {
  const card = document.createElement('div');
  card.className='result-card'+(isNew?' new-entry':'');
  card.dataset.id=entry.id;
  const url=isURL(entry.value);
  card.innerHTML=`
    <div class="card-header">
      <span class="card-format">${prettyFmt(entry.format)}</span>
      <span class="card-time">${entry.time}</span>
    </div>
    <div class="card-body">
      ${url?`<a class="card-link" href="${entry.value}" target="_blank" rel="noopener">🔗 ${entry.value}</a>`:''}
      <div class="card-value">${entry.value}</div>
      <div class="card-actions">
        <button class="card-action-btn primary" onclick="copyResult('${entry.id}')">📋 Kopyala</button>
        ${url?`<button class="card-action-btn" onclick="openURL('${entry.value}')">🌐 Aç</button>`:''}
        <button class="card-action-btn" onclick="shareResult('${entry.id}')">↗ Paylaş</button>
        <button class="card-action-btn" onclick="deleteResult('${entry.id}')">✕</button>
      </div>
    </div>`;
  return card;
}

function copyResult(id) {
  const e=results.find(r=>r.id===id); if(!e) return;
  if(navigator.clipboard) navigator.clipboard.writeText(e.value).then(()=>showToast('✓ Kopyalandı'));
  else { const t=document.createElement('textarea');t.value=e.value;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('✓ Kopyalandı'); }
}
function openURL(url){window.open(url,'_blank','noopener')}
function shareResult(id){const e=results.find(r=>r.id===id);if(!e)return;if(navigator.share)navigator.share({title:prettyFmt(e.format),text:e.value});else copyResult(id);}
function deleteResult(id){results=results.filter(r=>r.id!==id);const c=resultSection.querySelector(`[data-id="${id}"]`);if(c)c.remove();if(!results.length){emptyState.style.display='';historyHeader.style.display='none';}}

window.copyResult=copyResult;window.openURL=openURL;window.shareResult=shareResult;window.deleteResult=deleteResult;

document.addEventListener('visibilitychange',()=>{if(document.hidden&&scanning)stopAll();});
</script>
