<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ScanPro" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="Professional barcode and QR code scanner for iOS and Android" />
  <title>ScanPro – Barcode Scanner</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Apple Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="assets/icons/icon-120.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/icon-16.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- ZXing -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js" defer></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Splash Screen -->
<div id="splash" class="splash">
  <div class="splash-inner">
    <div class="splash-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="22" height="22" rx="3" stroke="currentColor" stroke-width="3"/>
        <rect x="10" y="10" width="10" height="10" fill="currentColor"/>
        <rect x="38" y="4" width="22" height="22" rx="3" stroke="currentColor" stroke-width="3"/>
        <rect x="44" y="10" width="10" height="10" fill="currentColor"/>
        <rect x="4" y="38" width="22" height="22" rx="3" stroke="currentColor" stroke-width="3"/>
        <rect x="10" y="44" width="10" height="10" fill="currentColor"/>
        <rect x="38" y="38" width="6" height="6" fill="currentColor"/>
        <rect x="50" y="38" width="6" height="6" fill="currentColor"/>
        <rect x="38" y="50" width="6" height="6" fill="currentColor"/>
        <rect x="50" y="50" width="6" height="6" fill="currentColor"/>
      </svg>
    </div>
    <h1 class="splash-title">ScanPro</h1>
    <p class="splash-subtitle" data-tr="Profesyonel Barkod Okuyucu" data-en="Professional Barcode Scanner"></p>
    <div class="splash-loader">
      <div class="splash-bar"></div>
    </div>
  </div>
</div>

<!-- App Container -->
<div id="app" class="app hidden">

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <div class="app-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
          <rect x="5" y="5" width="5" height="5" fill="currentColor"/>
          <rect x="19" y="2" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
          <rect x="22" y="5" width="5" height="5" fill="currentColor"/>
          <rect x="2" y="19" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
          <rect x="5" y="22" width="5" height="5" fill="currentColor"/>
          <rect x="19" y="19" width="3" height="3" fill="currentColor"/>
          <rect x="25" y="19" width="3" height="3" fill="currentColor"/>
          <rect x="19" y="25" width="3" height="3" fill="currentColor"/>
          <rect x="25" y="25" width="3" height="3" fill="currentColor"/>
        </svg>
      </div>
      <span class="app-name">ScanPro</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="langToggle" title="Language">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 1 0 20M12 2a14.5 14.5 0 0 0 0 20M2 12h20"/></svg>
        <span id="langLabel">TR</span>
      </button>
      <button class="icon-btn" id="themeToggle" title="Theme">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="scanner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
      <span data-tr="Tara" data-en="Scan"></span>
    </button>
    <button class="tab-btn" data-tab="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span data-tr="Geçmiş" data-en="History"></span>
      <span class="badge" id="historyBadge" style="display:none">0</span>
    </button>
    <button class="tab-btn" data-tab="export">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span data-tr="Dışa Aktar" data-en="Export"></span>
    </button>
  </nav>

  <!-- Main Content -->
  <main class="main-content">

    <!-- ===== SCANNER TAB ===== -->
    <section class="tab-panel active" id="tab-scanner">

      <!-- Camera Viewport -->
      <div class="scanner-viewport" id="scannerViewport">
        <video id="cameraFeed" playsinline autoplay muted></video>
        <canvas id="scanCanvas" style="display:none"></canvas>

        <!-- Scan Frame -->
        <div class="scan-frame">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="scan-line"></div>
        </div>

        <!-- Overlay Controls -->
        <div class="viewport-controls">
          <button class="viewport-btn" id="flashBtn" title="Flash">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </button>
          <button class="viewport-btn" id="flipCameraBtn" title="Flip Camera">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.79"/></svg>
          </button>
          <button class="viewport-btn" id="zoomInBtn" title="Zoom In">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <button class="viewport-btn" id="zoomOutBtn" title="Zoom Out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
        </div>

        <!-- Status Indicator -->
        <div class="scan-status" id="scanStatus">
          <div class="status-dot"></div>
          <span id="statusText" data-tr="Taranıyor..." data-en="Scanning..."></span>
        </div>

        <!-- Camera Permission Overlay -->
        <div class="permission-overlay hidden" id="permissionOverlay">
          <div class="permission-card">
            <div class="permission-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <h3 data-tr="Kamera İzni Gerekli" data-en="Camera Permission Required"></h3>
            <p data-tr="Barkod tarayabilmek için kamera erişimine izin verin." data-en="Allow camera access to scan barcodes."></p>
            <button class="btn-primary" id="requestPermission" data-tr="İzin Ver" data-en="Allow Camera"></button>
          </div>
        </div>
      </div>

      <!-- Scanner Controls -->
      <div class="scanner-controls">
        <!-- Scan Mode Toggle -->
        <div class="mode-toggle">
          <button class="mode-btn active" id="modeContinuous" data-tr="Sürekli Tara" data-en="Continuous"></button>
          <button class="mode-btn" id="modeSingle" data-tr="Tekli Tara" data-en="Single"></button>
        </div>

        <!-- Main Scan Button -->
        <button class="scan-btn" id="mainScanBtn">
          <div class="scan-btn-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
          </div>
          <span id="scanBtnLabel" data-tr="Taramayı Başlat" data-en="Start Scanning"></span>
        </button>

        <!-- Zoom Slider -->
        <div class="zoom-control">
          <span class="zoom-label">1x</span>
          <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1" />
          <span class="zoom-label" id="zoomValue">1x</span>
        </div>
      </div>

      <!-- Last Result Card -->
      <div class="result-card hidden" id="resultCard">
        <div class="result-header">
          <div class="result-type-badge" id="resultTypeBadge"></div>
          <span class="result-time" id="resultTime"></span>
        </div>
        <div class="result-content" id="resultContent"></div>

        <!-- Parsed Info -->
        <div class="parsed-info hidden" id="parsedInfo"></div>

        <!-- Result Actions -->
        <div class="result-actions">
          <button class="action-btn" id="copyResultBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span data-tr="Kopyala" data-en="Copy"></span>
          </button>
          <button class="action-btn" id="shareResultBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            <span data-tr="Paylaş" data-en="Share"></span>
          </button>
          <button class="action-btn" id="openUrlBtn" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            <span data-tr="Aç" data-en="Open"></span>
          </button>
        </div>
      </div>
    </section>

    <!-- ===== HISTORY TAB ===== -->
    <section class="tab-panel hidden" id="tab-history">
      <div class="history-header">
        <h2 data-tr="Tarama Geçmişi" data-en="Scan History"></h2>
        <div class="history-actions">
          <button class="text-btn danger" id="clearHistoryBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            <span data-tr="Temizle" data-en="Clear"></span>
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="historySearch" placeholder="Ara..." />
      </div>

      <!-- Filter chips -->
      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-filter="all" data-tr="Tümü" data-en="All"></button>
        <button class="chip" data-filter="QR_CODE" data-tr="QR Kod" data-en="QR Code"></button>
        <button class="chip" data-filter="1D" data-tr="1D Barkod" data-en="1D Barcode"></button>
        <button class="chip" data-filter="2D" data-tr="2D Barkod" data-en="2D Barcode"></button>
      </div>

      <!-- History List -->
      <div class="history-list" id="historyList">
        <div class="empty-state" id="emptyHistory">
          <div class="empty-icon">
            <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="32" cy="32" r="28"/><path d="M32 20v12l8 8"/></svg>
          </div>
          <p data-tr="Henüz tarama yapılmadı" data-en="No scans yet"></p>
          <span data-tr="Barkod tarayarak başlayın" data-en="Start by scanning a barcode"></span>
        </div>
      </div>
    </section>

    <!-- ===== EXPORT TAB ===== -->
    <section class="tab-panel hidden" id="tab-export">
      <h2 data-tr="Dışa Aktar" data-en="Export Data"></h2>
      <p class="export-desc" data-tr="Tarama geçmişinizi farklı formatlarda dışa aktarın." data-en="Export your scan history in different formats."></p>

      <div class="export-stats">
        <div class="stat-card">
          <span class="stat-num" id="totalScans">0</span>
          <span class="stat-label" data-tr="Toplam Tarama" data-en="Total Scans"></span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="todayScans">0</span>
          <span class="stat-label" data-tr="Bugün" data-en="Today"></span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="uniqueTypes">0</span>
          <span class="stat-label" data-tr="Kod Türü" data-en="Code Types"></span>
        </div>
      </div>

      <div class="export-options">
        <div class="export-card" id="exportTXT">
          <div class="export-icon txt">TXT</div>
          <div class="export-info">
            <h3>Text File</h3>
            <p data-tr="Düz metin formatında" data-en="Plain text format"></p>
          </div>
          <button class="btn-export" data-tr="İndir" data-en="Download"></button>
        </div>
        <div class="export-card" id="exportCSV">
          <div class="export-icon csv">CSV</div>
          <div class="export-info">
            <h3>CSV File</h3>
            <p data-tr="Elektronik tablo formatında" data-en="Spreadsheet format"></p>
          </div>
          <button class="btn-export" data-tr="İndir" data-en="Download"></button>
        </div>
        <div class="export-card" id="exportJSON">
          <div class="export-icon json">JSON</div>
          <div class="export-info">
            <h3>JSON File</h3>
            <p data-tr="Yapılandırılmış veri formatında" data-en="Structured data format"></p>
          </div>
          <button class="btn-export" data-tr="İndir" data-en="Download"></button>
        </div>
      </div>

      <!-- PWA Install -->
      <div class="install-section hidden" id="installSection">
        <div class="install-card">
          <div class="install-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <div class="install-info">
            <h3 data-tr="Uygulamayı Yükle" data-en="Install App"></h3>
            <p data-tr="Ana ekrana ekleyerek daha hızlı erişin" data-en="Add to home screen for faster access"></p>
          </div>
          <button class="btn-primary" id="installBtn" data-tr="Yükle" data-en="Install"></button>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- Settings Modal -->
<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3 data-tr="Ayarlar" data-en="Settings"></h3>
      <button class="icon-btn" id="closeSettings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="setting-group">
        <label class="setting-label" data-tr="Titreşim Geri Bildirimi" data-en="Haptic Feedback"></label>
        <label class="toggle-switch">
          <input type="checkbox" id="hapticToggle" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-group">
        <label class="setting-label" data-tr="Ses Efektleri" data-en="Sound Effects"></label>
        <label class="toggle-switch">
          <input type="checkbox" id="soundToggle" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-group">
        <label class="setting-label" data-tr="Otomatik URL Aç" data-en="Auto-open URLs"></label>
        <label class="toggle-switch">
          <input type="checkbox" id="autoOpenToggle" />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-group">
        <label class="setting-label" data-tr="Geçmişe Kaydet" data-en="Save to History"></label>
        <label class="toggle-switch">
          <input type="checkbox" id="saveHistoryToggle" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-group">
        <label class="setting-label" data-tr="Kamera Kalitesi" data-en="Camera Quality"></label>
        <select class="setting-select" id="cameraQuality">
          <option value="environment" data-tr="Arka Kamera" data-en="Back Camera">Arka Kamera</option>
          <option value="user" data-tr="Ön Kamera" data-en="Front Camera">Ön Kamera</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast hidden" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="toast-icon"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastText"></span>
</div>

<!-- Scripts -->
<script src="storage.js"></script>
<script src="export.js"></script>
<script src="scanner.js"></script>
<script src="app.js"></script>
</body>
</html>
